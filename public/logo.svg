<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-label="PeabiruJobs">
  <!--
    Ordem de pintura (efeito de entrelaçamento):
    1. trilha verde completa
    2. segmento navy da trilha (a troca de cor acontece atrás das hastes)
    3. P verde  4. P navy (cobrem a trilha -> trilha passa POR TRÁS das hastes)
    5. trecho superior da trilha redesenhado (passa POR CIMA do bojo navy)
    6. seta
  -->

  <!-- 1. trilha completa (verde) -->
  <path d="M 100 330 C 165 288 215 284 268 248 C 316 216 338 208 388 172 C 425 145 445 122 472 94"
        fill="none" stroke="#2EBD8B" stroke-width="26" />

  <!-- 2. segmento navy da trilha (entra por baixo à esquerda) -->
  <path d="M 100 330 C 165 288 215 284 268 248"
        fill="none" stroke="#16233F" stroke-width="26" />

  <!-- 3. P verde (haste colada à direita da navy, bojo maior e mais baixo) -->
  <g fill="none" stroke="#2EBD8B" stroke-width="30">
    <path d="M 293 152 L 293 336" />
    <path d="M 293 152 L 348 152 C 396 152 420 178 420 214 C 420 250 396 276 348 276 L 293 276" />
  </g>

  <!-- 4. P navy -->
  <g fill="none" stroke="#16233F" stroke-width="32">
    <path d="M 262 96 L 262 336" />
    <path d="M 262 96 L 326 96 C 376 96 400 122 400 158 C 400 194 376 220 326 220 L 262 220" />
  </g>

  <!-- 5. trecho superior da trilha por cima do bojo navy -->
  <path d="M 338 208 C 366 190 388 172 388 172 C 425 145 445 122 472 94"
        fill="none" stroke="#2EBD8B" stroke-width="26" />

  <!-- 6. seta -->
  <path d="M 0 0 L -64 -28 L -64 28 Z" fill="#2EBD8B"
        transform="translate(516 52) rotate(-44)" />

  <!-- wordmark -->
  <text x="320" y="438" text-anchor="middle"
        font-family="Inter, 'Segoe UI', system-ui, Arial, sans-serif"
        font-size="74" fill="#16233F" letter-spacing="-1">
    <tspan font-weight="800">Peabiru</tspan><tspan font-weight="600">Jobs</tspan>
  </text>
</svg>
